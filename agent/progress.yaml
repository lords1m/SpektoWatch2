  M15:
    - { id: task-1-recording-persistence-durability, name: "Recording persistence durability",         status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-1-recording-persistence-durability.md, notes: "Completed 2026-05-24 via two parallel subagents. Sub-1 (soft-delete sidecar) + Sub-3 (strict UUID decode) had already landed in prior sessions. Sub-2 landed: MeasurementDataWriter writeHeader/updateFrameCount now use try fileHandle.write(contentsOf:); async frame-write path catches errors and records drops instead of advancing frameCount; init now throws on header-write failure. New SpektoWatch2Tests/RecordingPersistenceDurabilityTests.swift (5 XCTest cases) covers sidecar round-trip, sidecar-on-commit cleanup, corrupt sidecar tolerance, throwing-header init, and strict-UUID per-row skip. Hardware smoke (force-quit during undo window) + manual Xcode target wiring for the new test file remain." }
    - { id: task-2-audio-thread-realtime-safety,     name: "Audio-thread real-time safety",            status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-2-audio-thread-realtime-safety.md, notes: "Completed 2026-05-24. Sub-1: deleted per-frame setupMeasurementDataFileIfNeeded() from processFFTFrame; writer lifecycle is fully main-side (startAudioCapture / startRealRecording / measurementRecordingSink). Sub-2: widgetSpectralWeightingsLock migrated NSLock → OSAllocatedUnfairLock<Set<FrequencyWeighting>> with withLockUnchecked on the audio-read path and withLock on the main setter. Sub-3: sampleBuffer append + drop/offset/compaction + per-loop-iteration read+copy+offset advance now wrapped under processingLock.withLockUnchecked in processSamples; processFFTFrame runs outside the lock. Negative grep: zero NSLock declarations and zero FileManager/UserDefaults calls reachable from processFFTFrame in AudioEngine.swift. Hardware stress test (window-size toggle under live recording) deferred to handoff." }
    - { id: task-3-watch-dsp-calibration-parity,     name: "Watch DSP calibration parity",             status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-3-watch-dsp-calibration-parity.md, notes: "Completed 2026-05-24. Sub-1: WatchAudioEngine.performFFT migrated zop → zrop with vDSP_ctoz deinterleave (matches Processing/FFTProcessor.swift); buffers resized to N/2 split-complex pairs plus an N-length windowedSamples scratch. Sub-2: performVisualDCT replaced vDSP_vdbcon(..., 1) with explicit vDSP_vclip + vvlog10f + ×20 (amplitude-domain 20·log10, matches iOS code shape). Sub-3: new SpektoWatch2Tests/WatchDSPParityTests.swift reproduces the watch post-fix pipeline in-test (watch target not importable from iOS tests) and asserts 1 kHz bin parity within 0.5 dB plus regression guards against the old zop+2/N combination and the wrong log convention. Grep negative: zero remaining vDSP_DFT_zop_CreateSetup in watch target. Hardware ±0.5 dB acceptance + the ~12 dB level jump for existing watch-only recordings still need a paired-device pass." }
    - { id: task-4-export-off-main,                  name: "PDF + CSV export off main with cancel",    status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-4-export-off-main.md, notes: "Completed 2026-05-24. RecordingDetailView now pre-resolves RecordingManager URLs on main and runs PDF + CSV generation in Task.detached with one active export task, a progress overlay, and an Abbrechen action. PDFReportGenerator and CSVExporter check Task cancellation every 256 frames; PDF also checks before/after measurement loading. New focused tests cover immediate cancellation for CSV and PDF exports. iOS simulator build passed; targeted direct xcodebuild test-without-building passed after the first XcodeBuildMCP test_sim call timed out at the tool layer post-build." }
    - { id: task-5-streaming-stored-data-provider,   name: "Streaming StoredDataProvider",             status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-5-streaming-stored-data-provider.md, notes: "Completed 2026-05-24. StoredDataProvider no longer exposes/eagerly fills spectrogramHistory; bootstrap and scrub use MeasurementDataReader.readFrameSummary(at:) so full FFT payload bytes are skipped for levelHistory/metricRows. Added SpectrogramFrameWindow plus disk-backed spectrogramFrames(in:) and bounded spectrogramOverview(maxFrameCount:) APIs with cancellation checks. RecordingDetailView now loads a capped stored overview (1800 frames) for existing playback/waterfall UI instead of retaining every stored FFT frame. New StoredDataProviderTests cover eager small-data bootstrap, disk window reads, overview downsampling, and cancellation propagation. iOS build + focused tests passed." }
    - { id: task-6-pdf-energy-correct-averaging,     name: "PDF energy-correct dB averaging",          status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-6-pdf-energy-correct-averaging.md, notes: "Completed 2026-05-24. PDFReportGenerator.loadAverageThirdOctaves now averages per-band Z/A/C levels in the linear-power domain (Double accumulator), converting back via 10·log10 with a -120 dB sentinel floor. Two static helpers (energyMeanDB, energyAverageDB) expose the math for tests. New PDFReportGeneratorTests cover the spec's -20/-80 asymmetric fixture (≈-23 dB energy mean, not the -50 dB arithmetic mean), idempotent identical-value mean, empty/floor handling, and zero-divider/zero-sum guards. Audit of other dB-averaging sites (loadBroadbandValues, RecordingDetailView, AudioEngine LAeq, WatchAudioEngine.lafEnergy) confirmed energy-correct; masking sites flagged but out of M15 scope. Snapshot baselines may need refresh on next Xcode Cloud RECORD_SNAPSHOTS=YES run for fixtures with dynamic range." }
    - { id: task-7-lcpeak-c-weighted,                name: "LCpeak from the C-weighted spectrum",      status: completed, file: agent/tasks/milestone-15-critical-stability-correctness/task-7-lcpeak-c-weighted.md, notes: "Completed 2026-05-24. AudioEngine.processFFTFrame now computes LCpeak via Approach A (frequency-domain C-weighted peak detector): vDSP_vmul of FFT amplitude bins × cWeightingGains → vDSP_maxv → 20·log10 + calibrationOffset. lcPeakScratch pre-allocated alongside fftEnergyScratch. updateUI reads currentPeakLevel from spectrogramData.levels['LCpeak'] instead of raw broadband peak. Consumer audit: ControlBarView, SingleValueWidget, PDFReportGenerator, WidgetSettingsView all read from levels dict — no changes needed. Semantic boundary documented in Recording.swift peakLevel property doc-comment. New LCpeakComputationTests.swift (5 tests): 1 kHz parity within 1 dB, 31.5 Hz attenuation 1.5–6 dB, 20 Hz larger attenuation, all-zero floor, multi-tone dominant bin. Hardware acceptance: equal-RMS 1 kHz vs 31.5 Hz tones should differ by ~3 dB LCpeak (was identical pre-fix)." }
