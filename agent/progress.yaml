  M13:
    - { id: task-1-app-services-injection,        name: "AppServices injection layer",                status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-1-app-services-injection.md, notes: "Code-side landed 2026-05-21. New AppServices.swift (@MainActor ObservableObject) owns the 5 eager managers + deferred AudioEngine/MaskingEngine via startAudio(). Convenience init() + testFixture(...) static factory. SpektoWatch2App uses one @StateObject AppServices instead of 5 individual @StateObjects + 1 AudioEngineContainer. Body still calls 8 .environmentObject(...) (consumer migration explicitly deferred to a future task; scope here was producer-side only). Old AudioEngineContainer private type removed. iOS build green. Tests not migrated to testFixture (deferred — drop-in pattern across 5+ test files; do alongside M13 task-3/-4 AudioEngine extracts). Hardware acceptance gated on M13 task-9." }
    - { id: task-2-recording-detail-split,        name: "Split RecordingDetailView",                  status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-2-recording-detail-split.md, notes: "Phase 1 landed 2026-05-21: 3 standalone helpers extracted — Views/RecordingDetailComponents.swift (MiniLineChart + StatRow, 96 LOC), Views/AudioPlayerManager.swift (161 LOC), Views/PhotoPickerView.swift (39 LOC). RecordingDetailView.swift dropped 1496→1211 LOC (-285). Phase 2 (per-tab card split into RecordingPlaybackSection / Markers / Export / Notes / Metadata) deferred — requires a shared RecordingDetailViewModel for the 29+ @State graph that spans all tabs; high regression risk without hardware pass. Recommended timing: after M13 task-4 (LiveAcousticState) so the VM can consume the new live-state pattern. iOS build green." }
    - { id: task-3-extract-calibration-provider,  name: "Extract CalibrationProvider",                status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-3-extract-calibration-provider.md, notes: "Code-side landed 2026-05-21. New CalibrationProvider.swift (135 LOC, pure enum) owns the device-offset table, currentDeviceModel(), recommendedOffset, resolveStartupOffset(defaults:), persist(offset:). AudioEngine retains @Published var calibrationOffset to preserve the SpectrogramSettingsView Slider binding (deliberate — moving the value off-engine would touch 5+ unrelated call sites). AudioEngine init replaces 13-line load block with one provider call; getDeviceModel + getRecommendedCalibrationOffset removed (54 LOC device map + 17 LOC static methods). AudioEngine: 1761 → 1691 LOC (-70). SpectrogramSettingsView 1-line rewrite. New CalibrationProviderTests.swift covers 5 cases (3 known device IDs + 2 unknown fallback + load/version-bump). iOS + watchOS builds green." }
    - { id: task-4-extract-live-acoustic-state,   name: "Extract LiveAcousticState",                  status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-4-extract-live-acoustic-state.md, notes: "Phase 1 landed 2026-05-21: new LiveAcousticState.swift (61 LOC) owns all 12 @Published live metrics. AudioEngine holds `let live = LiveAcousticState()`; 12 computed forwarders preserve existing read/write call sites unchanged; init bridges live.objectWillChange into engine's objectWillChange so existing @ObservedObject AudioEngine consumers still update. Three .onReceive($projection) sites migrated to audioEngine.live.$currentSpectrogramData (LAFGraphView, LAFGraphWidget, SingleValueWidget). AudioEngine 1691→1753 LOC (+62 due to forwarders; deletable in Phase 2). Phase 2 (per-widget migration to @ObservedObject live = audioEngine.live across 10 widgets) deferred — that's where the re-render breadth reduction materialises and the forwarders + bridge can be removed. iOS + watchOS builds green." }
    - { id: task-5-extract-recording-coordinator, name: "Extract RecordingCoordinator",               status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-5-extract-recording-coordinator.md, notes: "Phase 1 landed 2026-05-21: new RecordingCoordinator.swift (37 LOC) owns isRecordingToFile, isMeasurementRecording, recordingDuration as @Published. AudioEngine adds `let recording = RecordingCoordinator()`; 3 computed forwarders preserve existing call sites; recordingBridge republishes objectWillChange so @ObservedObject AudioEngine consumers still update; measurementRecordingSink (Combine subscription, .dropFirst()) replaces the didSet logic and runs setupMeasurementDataFileIfNeeded / closeMeasurementWriter with the same isRecordingToFile gating. AudioEngine 1753→1790 LOC (+37). Phase 2 (moving startRecording / stopRecording / cancelRecording into the coordinator) deferred — those methods orchestrate the AVAudioEngine session itself and require a larger refactor. iOS + watchOS builds green. Hardware functional acceptance (file writer closes cleanly mid-session) gated on M13 task-9." }
    - { id: task-6-kernel-math-extraction,        name: "Kernel math extraction",                     status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-6-kernel-math-extraction.md, notes: "Landed 2026-05-21: new Managers/SpectrumBandAggregator.swift (220 LOC) centralises third-octave + octave + Bark aggregation. The M12 negative-offset bug source — two identical implementations of the third-octave power-sum (AudioEngine.computeDisplayThirdOctaveBands + SpectrumBandChartView.thirdOctaveBands) — collapsed to one. AudioEngine -77 LOC (1790→1713), AudioWidgets -104 LOC (619→515). SpectrumBandChartView.computeBandData body 70→30 LOC (57% reduction). New SpectrumBandAggregatorTests.swift (7 cases) including a regression guard for the M12 sum-vs-mean bug. Level-history clamping/axis extraction deferred (intertwined with Canvas GraphicsContext). iOS + watchOS builds green." }
    - { id: task-7-watch-protocol-versioning,     name: "Watch protocol versioning + AppState",       status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-7-watch-protocol-versioning.md, notes: "Phase 1 landed 2026-05-21. SpectrogramData.toBinaryData() now prepends a UInt8 schema version (0x01); fromBinaryData rejects unknown versions cleanly. New Shared/WatchAppState.swift (105 LOC) defines a Codable envelope (activePresetID, isRecording, designAccent, theme, optional toneGenerator, schemaVersion) with JSON encode/decode helpers and version-mismatch rejection. WatchConnectivityProtocol gains MessageType.appStateUpdate + makeAppStateUpdateMessage + appStateUpdate(from:) decoder. Both connectivity managers (iOS + watch) gained the appStateUpdate switch arm (decode-and-drop today; consumption is Phase 2). New WatchProtocolVersioningTests.swift covers 7 cases including version-byte rejection on both SpectrogramData and WatchAppState. Phase 2 (iOS broker observing accent/theme/preset/recording + watch-side store + face migration from hardcoded phosphor) deferred — crosses concerns that need hardware verification together. iOS + watchOS builds green." }
    - { id: task-8-persistence-registry,          name: "Persistence registry",                       status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-8-persistence-registry.md, notes: "Phase 1 landed 2026-05-21. New Shared/PersistenceKeys.swift (110 LOC) inventories every UserDefaults / AppGroup / @AppStorage key with tier, schema version, and migration rule. 8 files migrated from string literals to registry constants: DashboardManager, CalibrationProvider, AudioEngine, Models/FFTConfiguration, Managers/BandstopFilterManager, ControlBarView, Shared/WatchWidgetConfiguration, both WatchConnectivityManager copies. Nested PersistenceKeys.FFT + Design enums for grouped namespaces. Sunset plan for DashboardConfiguration_v5 documented in the registry file. Phase 2 (one-shot PersistenceMigrator runner + @AppStorage declaration migration + legacy key removal) deferred. iOS + watchOS builds green. After migration: zero raw key strings remain outside the registry (a leftover CSV column header in CSVExporter named 'calibrationOffset' is a false positive in different namespace)." }
    - { id: task-9-acceptance,                    name: "Acceptance",                                 status: in_progress, file: agent/tasks/milestone-13-architecture-hygiene/task-9-acceptance.md, notes: "Code-side acceptance landed 2026-05-21. Handoff report agent/reports/2026-05-21-milestone-13-acceptance.md covers all 8 tasks: per-task verdict table (Phase 1 ✅ / Phase 2 deferred), 10 new files / 4 modified files / net ~477 LOC reduction, 19 new tests, architectural-pressure status (3 resolved, 2 partially reduced). 6 hardware-only verification items documented (cold-launch parity, audio correctness, widget render parity, recording flow, watch pairing, Instruments re-render). iOS + watchOS builds green at HEAD. Routing reminders: A2/M6-task-4 (entitlements) + A3/M11-task-1 (NSLock) still routed there. Phase 2 candidates (deletable forwarders) flagged for follow-up milestone if M13 promotes cleanly."}

