        removed. Bonus: stripped MetalWidgetManager of the dead renderers
        cache, getRenderer/releaseRenderer methods (depended on deleted
        MetalWidgetRenderer protocol), and unused sharedCommandQueue. Verified
        no live code references any deleted symbol. Managers/RecordingManager.swift
        was already deleted in Task 2.
    - id: task-10-acceptance
      name: Acceptance
      status: completed
      file: agent/tasks/milestone-6-code-audit-remediation/task-10-acceptance.md
      notes: >
        Handoff report at agent/reports/2026-05-19-milestone-6-acceptance.md.
        44-finding coverage table: 32 landed, 3 partial, 4 deferred, 5
        verification reversals. Negative checks clean (no new fatalError/
        try!/as!, no UserDefaults.standard in Complications, no NSLock on
        audio render thread). Manual hardware acceptance + App Group Xcode
