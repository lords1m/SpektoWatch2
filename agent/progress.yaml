    - id: task-5-spectrogram-metal-threading
      name: Spectrogram & Metal Threading
      status: partial
      file: agent/tasks/milestone-6-code-audit-remediation/task-5-spectrogram-metal-threading.md
      notes: >
        4 of 5 sub-items landed: OSAllocatedUnfairLock added to
        HighEndSpectrogramAdapter (snapshots in draw, lock-wrapped state
        mutations and writeColumn); PlaybackSpectrogramView fatalErrors
        replaced with isMetalReady flag + graceful degradation;
        buildColormapTexture moved eager into setColormap (removed from
        draw). #4 deferred: computeFromAudioSamples turns out to be dead
        code (no callers) — flag for Task 9 deletion. #1 partial: scalar
        race fixed; the GPU/CPU texture-replace race needs a structural
        double-buffer or semaphore gate (out of scope for this cycle).
    - id: task-6-audio-thread-realtime-safety
      name: Audio Thread Real-Time Safety
      status: completed
      file: agent/tasks/milestone-6-code-audit-remediation/task-6-audio-thread-realtime-safety.md
      notes: >
        Both sub-items landed. processingLock in AudioEngine converted from
        NSLock to OSAllocatedUnfairLock across all six call sites (no more
        pthread_mutex_lock on the audio render thread); audio-thread reads
        now snapshot the lock-protected trio (fftSize, fftProcessor,
        weightingProcessor) in one critical section. Watch debug print
        blocks (input RMS probe + FFT output probe + debugFrameCount
        storage) gated behind #if DEBUG so heap allocations and stdout
        locks compile out in release. Flagged: widgetSpectralWeightingsLock
        has the same NSLock-on-audio-thread shape but wasn't in the audit;
        candidate for follow-up.
    - id: task-7-watch-lifecycle-and-battery
      name: Watch Lifecycle & Battery
      status: completed
      file: agent/tasks/milestone-6-code-audit-remediation/task-7-watch-lifecycle-and-battery.md
      notes: >
        All three sub-items landed (including #8/#9 folded from Task 3).
        Watch audio engine now stops on WKExtendedRuntimeSession expire/
        invalidate AND on scenePhase .background (unless an extended runtime
        session is .running). Live-data delivery to main coalesced to 5 Hz
        via OSAllocatedUnfairLock + pendingLiveData (was per-callback async
        with 1024-float copies). Shared/RingBuffer.swift added; both
        WatchSpectrogramView and WatchSpectrogramWidget switched from
        [[Float]] + O(n) removeFirst() to O(1) ring-buffer append.
    - id: task-8-ios-ui-state-hygiene
      name: iOS UI State Hygiene
      status: partial
      file: agent/tasks/milestone-6-code-audit-remediation/task-8-ios-ui-state-hygiene.md
      notes: >
        2 of 4 sub-items landed: WidgetSize zero-clamp + Codable decode
        migration + resize-site clamp; onChange re-entrancy guard via
        activeMicrophoneSource check (audit's suggested guard wouldn't
        actually work given SwiftUI onChange semantics). Two audit claims
        falsified during verification: #30 (the forwarder DOES catch
        drop-delegate mutations via dashboardManager.objectWillChange
        propagation; perf concern is real but a structural refactor
        deferred) and #41 (cached @ObservedObject preview is the correct
        pattern; SwiftUI re-runs init on parent re-render; audit's
        proposed direct-access fix would actually break observation).
    - id: task-9-dead-code-purge
      name: Dead Code Purge
      status: completed
      file: agent/tasks/milestone-6-code-audit-remediation/task-9-dead-code-purge.md
      notes: >
        Deleted: DashboardView.swift (0 bytes), WidgetSystem.swift (0 bytes),
        Views/SaveRecordingView.swift, AudioWidget.swift (all 3 protocols);
        struct SpectrogramView removed (kept SpectrogramTimeSpan enum —
