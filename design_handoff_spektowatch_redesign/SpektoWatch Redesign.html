<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SpektoWatch · Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: oklch(0.10 0.012 255);
    min-height: 100vh;
    font-family: "Inter", system-ui, sans-serif;
    color: oklch(0.95 0.005 255);
  }
  .stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 24px;
    background:
      radial-gradient(60% 50% at 50% 30%, oklch(0.20 0.05 250 / 0.3), transparent 70%),
      linear-gradient(180deg, oklch(0.08 0.01 255), oklch(0.04 0.008 255));
  }
  .phone-wrap {
    flex: 0 0 auto;
  }
  #root {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="phone-wrap">
    <div id="root"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="ios-frame.jsx"></script>
<script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="react" src="app-core.jsx"></script>
<script type="text/babel" data-presets="react" src="screens.jsx"></script>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
